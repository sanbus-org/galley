name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ contains(github.server_url, 'github') && 'ubuntu-latest' || 'codeberg-medium' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Zig
        run: |
          URL=$(curl -s https://ziglang.org/download/index.json | jq -r '."0.16.0"."x86_64-linux".tarball')
          curl -L "$URL" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >>$GITHUB_PATH

      - name: Run unit tests
        run: |
          zig build galley
          ./zig-out/bin/galley --parser-type lr languages/galley --with-ast
          for language in $(ls languages/); do
            if [ "$language" = "galley" ]; then
              continue
            fi
            ./zig-out/bin/galley languages/$language --no-ast
          done
          zig build test --summary all

      - name: Run benchmarks
        run: python3 scripts/benchmark.py --validate-only
