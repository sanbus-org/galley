name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ contains(github.server_url, 'github') && 'blacksmith-32vcpu-ubuntu-2404' || 'codeberg-medium' }}
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Zig
        run: |
          URL=$(curl -s https://ziglang.org/download/index.json | jq -r '."0.16.0"."x86_64-linux".tarball')
          curl -L "$URL" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >>$GITHUB_PATH

      - name: Run tests
        run: zig build test --summary all --test-timeout 30m
